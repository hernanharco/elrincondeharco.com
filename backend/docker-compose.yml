services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Al estar dentro de /backend, el .env está en la misma carpeta
    env_file:
      - .env
    environment:
      # Mapea las variables PG* a POSTGRES_* que usa el contenedor
      POSTGRES_DB: ${PGDATABASE:-neondb}
      POSTGRES_USER: ${PGUSER:-neondb_owner}
      POSTGRES_PASSWORD: ${PGPASSWORD:-localpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-neondb_owner} -d ${PGDATABASE:-neondb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: