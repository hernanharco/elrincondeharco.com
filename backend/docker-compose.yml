services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elrincon-backend
    restart: always
    # Mantenemos los puertos para que puedas acceder desde fuera al puerto 8000
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      # Estas variables se inyectarán desde tu archivo .env
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT}
      - PGDATABASE=${PGDATABASE}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - PGSCHEMA=${PGSCHEMA}
      - DATABASE_URL=${DATABASE_URL}
    env_file:
      - .env
    networks:
      - dokploy-network

networks:
  dokploy-network:
    name: dokploy-network
    # IMPORTANTE: Como vimos en tu terminal, esta red es de tipo 'overlay' y 'swarm'.
    # Al marcarla como external, el compose se unirá a ella.
    external: true