server {
    listen 4321;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Proxy a authCore ──────────────────────────────────────
    # El frontend llama a /auth-proxy/* y nginx redirige a authCore.
    # authCore debe estar en la misma red Docker (elrincondeharco_net).
    location /auth-proxy/ {
        proxy_pass http://authcore-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;

        # Timeouts para authCore
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Assets con caché larga ────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API del propio Portfolio ──────────────────────────────
    # En producción, también se puede servir desde nginx si es necesario
    location /api/ {
        proxy_pass http://portfolio-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Todas las rutas — SPA routing ─────────────────────────
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
