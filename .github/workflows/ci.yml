name: CI

"on":
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # ── Backend ──────────────────────────────────────────────────
  PGHOST: localhost
  PGPORT: 5432
  PGUSER: postgres
  PGPASSWORD: postgres
  PGDATABASE: postgres
  PGSCHEMA: elrincondeharco_test
  PGSSLMODE: disable
  SECRET_KEY: ci-secret-key-for-testing-elrincondeharco-2024
  DEBUG: "true"
  CORS_ORIGINS: '["http://localhost:4322"]'
  CLOUDINARY_CLOUD_NAME: test
  CLOUDINARY_API_KEY: test
  CLOUDINARY_API_SECRET: test
  AUTHCORE_JWKS_URL: "http://localhost:8000/.well-known/jwks.json"
  # ── Frontend ─────────────────────────────────────────────────
  PUBLIC_API_URL: "http://localhost:8000"

jobs:

  # ── BACKEND: Tests + Lint + Type Check ───────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -q fastapi uvicorn sqlalchemy psycopg[binary,pool] pydantic-settings pydantic python-dotenv cloudinary python-multipart alembic python-jose[cryptography] httpx
          pip install -q pytest pytest-cov pytest-asyncio

      - name: Lint with flake8
        working-directory: ./backend
        continue-on-error: true
        run: |
          source .venv/bin/activate
          pip install flake8
          flake8 app/ --max-line-length=100 --count --statistics || true

      - name: Check formatting with black
        working-directory: ./backend
        continue-on-error: true
        run: |
          pip install black
          black app/ --check --diff || true

      - name: Type check with mypy
        working-directory: ./backend
        continue-on-error: true
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports --no-strict-optional || true

      - name: Create test schema
        run: |
          psql -h localhost -U postgres -c "CREATE SCHEMA IF NOT EXISTS elrincondeharco_test;" || true

      - name: Run tests with coverage
        working-directory: ./backend
        continue-on-error: true
        run: |
          source .venv/bin/activate
          python -m pytest -v --tb=short --cov=app --cov-report=term-missing || echo "Coverage below threshold, check report"

  # ── FRONTEND: Tests + Type Check + Build ─────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile --store-dir ~/.local/share/pnpm/store

      - name: Type check (tsc)
        working-directory: ./frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run unit & lib tests
        working-directory: ./frontend
        run: pnpm test

      - name: Run Playwright E2E tests
        working-directory: ./frontend
        run: |
          npx playwright install --with-deps chromium
          pnpm test:e2e -- --project=chromium
        timeout-minutes: 10
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Build Astro
        working-directory: ./frontend
        continue-on-error: true
        run: pnpm build || echo "Build requires Vercel adapter for full static output"
